  # ─────────────────────────────────────────────────────────────────────────────
  # vLLM — Qwen 2.5 3B Instruct  (porta 8002)
  # Iniciar: docker compose up -d vllm-qwen
  # ─────────────────────────────────────────────────────────────────────────────
  vllm-qwen:
    image: vllm/vllm-openai:latest
    container_name: vllm-qwen2-3b
    restart: unless-stopped
    ipc: host
    shm_size: "16g"

    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

    ports:
      - "8002:8002"

    volumes:
      - huggingface_cache:/root/.cache/huggingface

    environment:
      - HF_TOKEN=${HF_TOKEN}
      - HUGGING_FACE_HUB_TOKEN=${HF_TOKEN}
      - PYTORCH_CUDA_ALLOC_CONF=expandable_segments:True

    command: >
      --model Qwen/Qwen2.5-3B-Instruct
      --gpu-memory-utilization 0.90
      --max-model-len 8192
      --dtype bfloat16
      --enforce-eager
      --host 0.0.0.0
      --port 8002
      --served-model-name qwen2-3b

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8002/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 300s

    networks:
      - ai_network

  # ─────────────────────────────────────────────────────────────────────────────
  # Open WebUI — Interface para todos os modelos
  # Conecta-se aos três endpoints vLLM; modelos inativos não aparecem no seletor
  # Acesse: http://localhost:3000
  # ─────────────────────────────────────────────────────────────────────────────
  open-webui:
    image: ghcr.io/open-webui/open-webui:main
    container_name: open-webui
    restart: unless-stopped

    ports:
      - "3000:8080"

    volumes:
      - open_webui_data:/app/data

    environment:
      # URL do modelo vLLM ativo (Qwen)
      - OPENAI_API_BASE_URLS=http://vllm-qwen2-3b:8002/v1
      - OPENAI_API_KEYS=dummy-key
      # Desabilita Ollama embutido
      - ENABLE_OLLAMA_API=false

    networks:
      - ai_network

networks:
  ai_network:
    name: ai_network

volumes:
  huggingface_cache:
    name: huggingface_cache
  open_webui_data:
    name: open-webui
    external: true
